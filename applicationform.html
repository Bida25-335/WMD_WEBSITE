  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    .form-container {
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #003366;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 15px;
      background-color: #003366;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      background-color: #0055a5;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>Dikgomo Ancestral Cover Application Form</h2>
    <form action="#" method="post">
      <label for="fullName">Full Name:</label>
      <input type="text" id="fullName" name="fullName" required>

      <label for="email">Email Address:</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Phone Number:</label>
      <input type="tel" id="phone" name="phone" required>

      <label for="coverType">Type of Cover:</label>
      <select id="coverType" name="coverType" required>
        <option value="">-- Select Cover Type --</option>
        <option value="life">Life Cover</option>
        <option value="funeral">Funeral Cover</option>
      </select>

      <label for="beneficiaries">Beneficiaries:</label>
      <textarea id="beneficiaries" name="beneficiaries" rows="3" placeholder="List names and relationships"></textarea>

      <label for="message">Additional Information:</label>
      <textarea id="message" name="message" rows="4" placeholder="Any special requests or notes"></textarea>

      <button type="submit">Submit Application</button>
    </form>
  </div>

</body>
